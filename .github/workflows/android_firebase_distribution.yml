name: Android Fastlane Firebase Distribution

on:
  workflow_dispatch:

  push:
    branches:
      - main

concurrency:
  group: firebase-distribution
  cancel-in-progress: true

jobs:
  distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Java setup
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Flutter setup
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Ruby setup
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      # Flutter dependencies
      - name: Install Flutter Dependencies
        run: flutter pub get

      # Install Ruby dependencies
      - name: Install Ruby Dependencies
        working-directory: android
        run: bundle install

      # Install Fastlane plugins
      - name: Install Fastlane Plugins
        working-directory: android
        run: bundle exec fastlane install_plugins

      # Run Fastlane Firebase Distribution
      - name: Run Fastlane Firebase Distribution
        working-directory: android
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_CLI_TOKEN: ${{ secrets.FIREBASE_CLI_TOKEN }}
        run: bundle exec fastlane firebase_distribution